services:
  go-backend:
    build: ./backend
    container_name: go-backend
    command: ./server
    ports:
      - "5010:5000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/url_shortener?sslmode=disable}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - JWT_SECRET=${JWT_SECRET:-dev-secret-key-do-not-use-in-production}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-24h}
      - CORS_ALLOW_ORIGINS=${CORS_ALLOW_ORIGINS:-*}
      - BASE_URL=${BASE_URL:-http://localhost:5010}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - HYPERFLAKE_DATACENTER_ID=${HYPERFLAKE_DATACENTER_ID:-1}
      - HYPERFLAKE_MACHINE_ID=${HYPERFLAKE_MACHINE_ID:-1}
      - HYPERFLAKE_EPOCH_MS=${HYPERFLAKE_EPOCH_MS:-1751241600000}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-}
      - S3_REGION=${S3_REGION:-ap-south-1}
      - S3_BUCKET=${S3_BUCKET:-}
      - S3_ENDPOINT=${S3_ENDPOINT:-s3.ap-south-1.amazonaws.com}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  redirect-service:
    build: ./backend
    container_name: redirect-service
    command: ./redirect
    ports:
      - "5011:5001"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/url_shortener?sslmode=disable}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - JWT_SECRET=${JWT_SECRET:-dev-secret-key-do-not-use-in-production}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-24h}
      - CORS_ALLOW_ORIGINS=${CORS_ALLOW_ORIGINS:-*}
      - BASE_URL=${BASE_URL:-http://localhost:5010}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - HYPERFLAKE_DATACENTER_ID=${HYPERFLAKE_DATACENTER_ID:-1}
      - HYPERFLAKE_MACHINE_ID=${HYPERFLAKE_MACHINE_ID:-1}
      - HYPERFLAKE_EPOCH_MS=${HYPERFLAKE_EPOCH_MS:-1751241600000}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-}
      - S3_REGION=${S3_REGION:-ap-south-1}
      - S3_BUCKET=${S3_BUCKET:-}
      - S3_ENDPOINT=${S3_ENDPOINT:-s3.ap-south-1.amazonaws.com}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: nextjs-frontend
    ports:
      - "3010:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:5010}
    depends_on:
      - go-backend
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: postgres
    ports:
      - "5430:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=url_shortener
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d url_shortener"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6380:6379"
    restart: unless-stopped

volumes:
  postgres-data:
